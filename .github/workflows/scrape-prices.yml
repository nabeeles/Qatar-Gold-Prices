name: Scrape Gold Prices

on:
  schedule:
    - cron: '0 * * * *' # Run every hour
  workflow_dispatch: # Allow manual triggering

jobs:
  scrape:
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      PUPPETEER_CACHE_DIR: ${{ github.workspace }}/.puppeteer-cache

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: './backend/package-lock.json'

      - name: Install Dependencies
        run: |
          cd backend
          npm ci

      - name: Enable Sandbox Support
        run: |
          sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0

      - name: Cache Puppeteer Browser
        uses: actions/cache@v4
        with:
          path: ${{ env.PUPPETEER_CACHE_DIR }}
          key: ${{ runner.os }}-puppeteer-${{ hashFiles('backend/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-puppeteer-

      - name: Install Chrome and Dependencies
        run: |
          cd backend
          npx puppeteer install
          # Preserve env vars for sudo to ensure correct cache path is used
          sudo -E npx puppeteer browsers install chrome --install-deps

      - name: Verify Chrome Installation
        run: |
          find ${{ env.PUPPETEER_CACHE_DIR }} -name "chrome" -type f -executable

      - name: Run Scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          cd backend/scraper
          node index.js
